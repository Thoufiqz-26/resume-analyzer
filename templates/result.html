<div class="card">
    <h1>Resume Analysis Result</h1>

    <div class="result">
        Total Words: {{ words }}
    </div>

    <div class="result">
        Resume Score: {{ score }}/100
    </div>

    <div>
        <strong>Skills Found:</strong>
        <ul>
            {% for skill in skills %}
                <li>{{ skill }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="result">
        {{ feedback }}
    </div>

    <a href="/">Analyze Another Resume</a>
</div>
